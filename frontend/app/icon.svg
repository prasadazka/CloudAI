<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Sutradhar mark: interlocking thread/loop on a saffron→teal gradient circle.
       Evokes "sutra" (thread) + "dhar" (holder) — the orchestrator weaving sites together. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E25822"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#g)"/>
  <!-- Stylised S as two interlocking arcs (thread weaving) -->
  <path d="M 22 22 C 22 16, 32 16, 32 22 C 32 28, 22 28, 22 34 C 22 40, 32 40, 32 34"
        fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M 32 30 C 32 36, 42 36, 42 42 C 42 48, 32 48, 32 42"
        fill="none" stroke="#FFFFFF" stroke-width="4.5" stroke-linecap="round"/>
  <!-- accent dot = the AI/orchestrator -->
  <circle cx="48" cy="18" r="3.5" fill="#FFD166"/>
</svg>
